# mamba_sweep.yaml — Mamba 5M hyperparameter sweep on TPU
#
# ── Architecture-locked ──────────────────────────────────────────────────
# Every trial uses the SAME model architecture (n_layer, d_model, d_state,
# d_input, dt_rank, kernel_size, seq_len, batch_size). Only optimisation
# knobs vary — lr, weight_decay, grad_clip, warmup_steps. This means every
# trial compiles the SAME XLA HLO, so the in-process compilation cache is
# reused across all trials in a single `wandb agent --count N` invocation.
#
# Why locked: torch_xla 2.9 has a bug (pytorch/xla#9094, fix open as
# #9759) where the persistent compilation cache writes to disk but cannot
# load back on TPU — so every fresh Python process re-compiles from
# scratch, costing a few minutes per process restart. With architecture
# fixed and `--count N` set, each agent process pays the compile cost
# ONCE and then runs N trials at full speed. When #9759 merges into a
# nightly, the persistent cache will work and architecture-varying sweeps
# become viable again — at that point you can re-add d_state / dt_rank /
# n_layer to the parameters block.
#
# ── Usage ────────────────────────────────────────────────────────────────
# 1. Register the sweep (returns a sweep id like `entity/project/abc123`):
#        wandb sweep mamba_sweep.yaml
#
# 2. Launch one or more agents (one per TPU host you have available).
#    Pass --count to amortise the compile cost across many trials in one
#    Python process — a typical v4-8 spends 2-4 minutes on first compile
#    then runs each subsequent trial in pure training time:
#        wandb agent --count 50 <entity>/<project>/<sweep_id>
#
# ── Trial budget ─────────────────────────────────────────────────────────
# Each trial caps at --max_tokens 2e8 (~200M tokens, ~10% of the full
# 2B-token SimpleStories budget). On TPU v4-8 with --bf16 and --checkpoint
# this is roughly 10–15 minutes of training time per trial. Promote the
# winning config to a full 2B-token run separately
# (set --max_tokens 2000000000 and remove --no_tokens_artifact).
#
# ── Early termination ────────────────────────────────────────────────────
# Hyperband kills under-performing runs once their val/loss is clearly
# worse than the median. Requires --val_every_n_steps to be small enough
# that hyperband sees several val readings within `min_iter` steps. With
# val_every_n_steps=200 and min_iter=400 each trial gets at least 2 val
# checkpoints before becoming eligible for early termination.

program: tpu_train.py
method: bayes
name: mamba-5m-bayes-sweep
description: |
  Bayesian hyperparameter sweep for the param-matched (~5M) Mamba LM
  on the SimpleStories corpus. Architecture is locked to the
  SimpleStories-5M-equivalent (n_layer=9, d_model=512, d_state=16,
  dt_rank=16, seq_len=512, batch_size=64) so every trial reuses the
  in-process XLA compilation cache. Trials use a 200M-token budget;
  promote the best config to a full 2B-token training run separately.

metric:
  name: val/loss
  goal: minimize

# Hyperband: at each rung, kill the bottom (1 - 1/eta) fraction of runs.
# `s` controls how many rungs (more rungs = more aggressive pruning).
early_terminate:
  type: hyperband
  min_iter: 400          # earliest step at which hyperband can prune
  eta: 3                 # keep top 1/eta of runs at each rung
  s: 2                   # number of rungs

# Wandb appends `--lr=X --weight_decay=Y ...` for each trial via ${args};
# anything before that block applies to every trial unchanged.
#
# Architecture flags hard-coded here (NOT in `parameters`) — changing any
# of these per trial would invalidate the compiled XLA graph and force a
# fresh compile, which is the entire problem we're working around.
command:
  - ${env}
  - python
  - ${program}
  # ── Hardware / precision (graph-affecting; hold constant) ──
  - --multi_device                            # one process per TPU core
  - --bf16                                    # bf16 autocast forward
  - --checkpoint                              # XLA grad checkpointing per block
  # ── Architecture (graph-affecting; hold constant) ──
  - --n_layer=9
  - --d_input=256
  - --d_model=512
  - --d_state=16
  - --dt_rank=16
  - --kernel_size=4
  - --seq_len=512
  - --batch_size=64
  # ── Budget / cadence (graph-neutral) ──
  - --max_tokens=200000000                    # 200M tok per trial (~10% of full)
  - --log_interval=20
  - --val_every_n_steps=200                   # frequent val for hyperband signal
  - --val_every_n_batches=20                  # cheap intermediate val
  - --eval_batches=50                         # full final val on budget hit
  - --sample_every_n_epochs=0                 # no sampling during sweep trials
  - --no_tokens_artifact                      # avoid race-uploading from N agents
  # ── wandb routing ──
  - --wandb_project=mamba-simplestories-sweep
  - --wandb_tags
  - sweep
  - 5m
  - bayes
  - locked-arch
  - ${args}

# Only graph-NEUTRAL hyperparameters here — varying these does not change
# the compiled XLA graph, so every trial reuses the cached compilation.
parameters:
  lr:
    distribution: log_uniform_values
    min: 5.0e-5
    max: 1.0e-3
  weight_decay:
    distribution: uniform
    min: 0.0
    max: 0.2
  grad_clip:
    values: [0.5, 1.0, 2.0]
  warmup_steps:
    values: [0, 100, 300, 600]
